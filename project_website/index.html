<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Personal AI Wardrobe Assistant — Team 13</title>
<style>
:root{
  --bg:#f7f4ef; --card:#ffffff; --ink:#2b2b2b; --muted:#6f6b63;
  --brand:#5b4c3a; --line:#eee; --bar:#cdb79f;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font:16px/1.65 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto}
.wrapper{max-width:980px;margin:24px auto;padding:0 16px}

/* Top navigation */
.topnav{
  position:sticky; top:0; z-index:1000; background:rgba(255,255,255,.9);
  backdrop-filter: blur(8px); border-bottom:1px solid var(--line);
}
.topnav-inner{
  max-width:980px;margin:0 auto;padding:10px 16px;
  display:flex;align-items:center;gap:14px
}
.brand{color:var(--brand);text-decoration:none;font-weight:800;font-size:16px}
.navlinks{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap}
.navlinks a{color:#3b3b3b;text-decoration:none;font-weight:600;
  padding:6px 10px;border-radius:10px}
.navlinks a.active{background:#efe7dc;color:#2a2a2a}

/* Header */
.header{
  background:linear-gradient(120deg,#e5d6c4,#d3bea6);
  border-radius:18px; padding:18px 20px; box-shadow:0 6px 18px rgba(0,0,0,.06);
  margin-top:16px; color:#2a1f16
}
h1{margin:0 2px 4px;font-size:28px}
.header .meta-line{color:var(--muted);font-size:13px;margin-left:2px}

/* Sections */
.card{background:var(--card);border-radius:18px;padding:20px;margin:18px 0;
  box-shadow:0 6px 18px rgba(0,0,0,.06)}
.section-title{
  display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;
  margin:8px 0 14px;color:#2d2a28
}
.section-title::before{
  content:"";display:inline-block;width:6px;height:18px;border-radius:3px;background:var(--bar)
}
.kv{display:grid;grid-template-columns:220px 1fr;gap:10px 18px}
.kv div{padding:8px 0;border-bottom:1px dashed var(--line)}
.kv b{color:var(--muted)}
.kv .no-border{border-bottom:0}

/* Members grid */
.members-grid{
  list-style:none; margin:0; padding:0;
  display:grid; gap:14px;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
}
.member-item{padding:12px 14px;border:1px solid #efefef;border-radius:12px;background:#fff}
.member-email a{text-decoration:none;color:#2b5b99;word-break:break-all}

@media (max-width:720px){.kv{grid-template-columns:1fr}}

footer{color:var(--muted);font-size:13px;margin:20px 0;text-align:center}
section, header#overview{scroll-margin-top:78px}
</style>
</head>
<body>
<nav class="topnav" role="navigation" aria-label="Primary">
  <div class="topnav-inner">
    <a class="brand" href="#overview">Personal AI Wardrobe Assistant</a>
    <div class="navlinks">
      <a href="#project" id="nav-project">Project</a>
      <a href="#aboutus" id="nav-about">About us</a>
    </div>
  </div>
</nav>

<div class="wrapper">
  <header class="header" id="overview" role="banner">
    <h1>Personal AI Wardrobe Assistant</h1>
    <div class="meta-line">P2025-08 · Team 13</div>
  </header>

  <section class="card" id="project">
    <div class="section-title">Project</div>
    <div class="kv">
      <div><b>Project name</b></div> <div id="project-name">[P2025-08] Personal AI Wardrobe Assistant</div>
      <div><b>Supervisor</b></div>   <div id="advisor">Qian Zhang</div>
    </div>
  </section>

  <section class="card" id="aboutus">
    <div class="section-title">About us</div>
    <div class="kv">
      <div><b>Team ID</b></div>   <div id="team-id">Team 13</div>
      <div><b>Members</b></div>
      <div class="no-border">
        <ul class="members-grid" id="members-list"></ul>
      </div>
    </div>
  </section>

  <footer>
    © 2025 Team 13
  </footer>
</div>

<script>
const members = [
  { name:"Haochen Wang", email:"ssyhw12@nottingham.edu.cn" },
  { name:"Jilin Song",   email:"scyjs10@nottingham.edu.cn" },
  { name:"Ruixi Yang",   email:"scyry2@nottingham.edu.cn" },
  { name:"Yuchen Fan",   email:"scyyf5@nottingham.edu.cn" },
  { name:"Jiajun Chen",  email:"scyjc4@nottingham.edu.cn" }
];

const ul = document.getElementById("members-list");
members.forEach(m=>{
  const li = document.createElement("li");
  li.className = "member-item";
  li.innerHTML = `<div class="member-name">${m.name}</div>
                  <div class="member-email"><a href="mailto:${m.email}">${m.email}</a></div>`;
  ul.appendChild(li);
});

// Default highlight: Project
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".navlinks a").forEach(a => a.classList.remove("active"));
  const el = document.getElementById("nav-project");
  if (el) el.classList.add("active");
});

// Toggle highlight on click
document.getElementById("nav-project").addEventListener("click", ()=> {
  document.getElementById("nav-project").classList.add("active");
  document.getElementById("nav-about").classList.remove("active");
});
document.getElementById("nav-about").addEventListener("click", ()=> {
  document.getElementById("nav-about").classList.add("active");
  document.getElementById("nav-project").classList.remove("active");
});
</script>
</body>
</html>
